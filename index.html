<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cinema-Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root { --cyan: #00f3ff; --purple: #7b2cbf; --dark: #0a0e17; }
    body { font-family:'Exo 2',sans-serif; background:var(--dark); color:#fff; margin:0; padding:0; }
    header { padding:1rem; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; }
    .logo { font-family:'Orbitron'; font-size:1.5rem; color:var(--cyan); font-weight:bold; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; padding:20px; max-width:1200px; margin:0 auto; }
    @media(max-width:768px) { .grid { grid-template-columns:1fr; } }
    .panel { background:#111; padding:15px; border-radius:10px; border:1px solid #333; }
    .cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:15px; margin-top:15px; }
    .card { background:#1a1a1a; border-radius:8px; overflow:hidden; border:1px solid #333; }
    .card img { width:100%; height:100px; object-fit:cover; }
    .card-body { padding:10px; }
    .btn { width:100%; padding:8px; margin-top:5px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
    .btn-watch { background:var(--cyan); color:#000; }
    .btn-dl { background:var(--purple); color:#fff; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center; }
    .modal.active { display:flex; }
    .modal-content { background:#111; padding:20px; border-radius:10px; width:90%; max-width:800px; text-align:center; border:1px solid var(--cyan); position:relative; }
    input { width:100%; padding:10px; margin:10px 0; background:#222; border:1px solid #444; color:#fff; border-radius:5px; }
    iframe { width:100%; aspect-ratio:16/9; border:none; background:#000; }
    #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:5px; opacity:0; transition:0.3s; pointer-events:none; }
    #toast.show { opacity:1; bottom:40px; }
  </style>
</head>
<body>

<header>
  <div class="logo">CINEMA-LIVE</div>
  <button id="auth-btn" onclick="openModal('auth-modal')" style="background:transparent; border:1px solid var(--cyan); color:var(--cyan); padding:5px 15px; border-radius:20px; cursor:pointer;">Login</button>
  <div id="user-info" style="display:none; color:var(--cyan);">🔹 <span id="t-count">0</span></div>
</header>

<div class="grid">
  <div class="panel">
    <h2 style="color:var(--cyan)">🎥 Full Movies</h2>
    <div id="m-cards" class="cards">Loading...</div>
  </div>
  <div class="panel">
    <h2 style="color:var(--purple)">🎞️ Trailers</h2>
    <div id="t-cards" class="cards">Loading...</div>
  </div>
</div>

<!-- Auth Modal -->
<div id="auth-modal" class="modal">
  <div class="modal-content" style="max-width:400px;">
    <h2 style="color:var(--cyan)">Register</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button class="btn btn-watch" onclick="register()">Sign Up</button>
    <button onclick="closeModal('auth-modal')" style="margin-top:10px; background:none; border:none; color:#888; cursor:pointer;">Close</button>
  </div>
</div>

<!-- Video Modal -->
<div id="video-modal" class="modal">
  <div class="modal-content">
    <button onclick="closeModal('video-modal')" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); color:#fff; border:none; padding:5px 10px; cursor:pointer; z-index:10;">X</button>
    <div id="player-container"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = window.location.origin + "/api";
  let token = localStorage.getItem("cinema_token");
  let tokens = 0;

  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  function openModal(id) { document.getElementById(id).classList.add("active"); }
  function closeModal(id) { 
    document.getElementById(id).classList.remove("active"); 
    // Clear player content to stop video
    document.getElementById("player-container").innerHTML = "";
  }

  async function register() {
    const e = document.getElementById("email").value;
    const p = document.getElementById("pass").value;
    try {
      const res = await fetch(`${API}/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: e, password: p })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail);
      
      localStorage.setItem("cinema_token", data.token);
      token = data.token;
      tokens = data.tokens;
      updateUI();
      closeModal("auth-modal");
      toast("✅ Registered! 5 Tokens Added.");
    } catch(err) { toast("❌ " + err.message); }
  }

  async function loadMovies() {
    try {
      const res = await fetch(`${API}/movies/full`);
      const data = await res.json();
      const container = document.getElementById("m-cards");
      if(data.length === 0) { container.innerHTML = "No movies found."; return; }
      
      container.innerHTML = data.map(m => `
        <div class="card">
          <img src="${m.thumbnail}" onerror="this.src='https://via.placeholder.com/150x100?text=No+Img'">
          <div class="card-body">
            <div style="font-size:0.9rem; margin-bottom:5px;">${m.title}</div>
            <button class="btn btn-watch" onclick='play(${JSON.stringify(m)})'>▶ Watch</button>
            ${m.direct_download && m.direct_download !== 'stream_only' ? `<button class="btn btn-dl" onclick="download(${m.id})">💾 Download</button>` : ''}
          </div>
        </div>
      `).join('');
    } catch(err) {
      console.error(err);
      document.getElementById("m-cards").innerHTML = "Error loading movies.";
    }
  }

  async function loadTrailers() {
    try {
      const res = await fetch(`${API}/movies/trailers`);
      const data = await res.json();
      const container = document.getElementById("t-cards");
      container.innerHTML = data.map(m => `
        <div class="card">
          <img src="${m.thumbnail}" onerror="this.src='https://via.placeholder.com/150x100?text=No+Img'">
          <div class="card-body">
            <div style="font-size:0.9rem; margin-bottom:5px;">${m.title}</div>
            <button class="btn btn-watch" onclick='play(${JSON.stringify(m)})'>▶ Watch</button>
          </div>
        </div>
      `).join('');
    } catch(err) { console.error(err); }
  }

  // Smart Play Function: Handles YouTube & Archive.org
  function play(movie) {
    const container = document.getElementById("player-container");
    
    if (movie.youtube_id && movie.youtube_id.trim() !== "") {
      // YouTube Embed
      container.innerHTML = `<iframe src="https://www.youtube.com/embed/${movie.youtube_id}?autoplay=1&rel=0" allowfullscreen></iframe>`;
    } else if (movie.url) {
      // Direct Link / Archive.org Embed
      // For Archive.org, we can often embed directly if it's an HTML page, 
      // but for MP4s, we use a video tag or link out.
      if (movie.url.includes("archive.org")) {
         // Try to embed archive.org player if possible, otherwise link out
         // Most archive.org pages have an embed code. For simplicity, we'll use a video tag if it ends in mp4, else link.
         if (movie.direct_download && movie.direct_download.endsWith('.mp4')) {
             container.innerHTML = `<video controls autoplay style="width:100%"><source src="${movie.direct_download}" type="video/mp4"></video>`;
         } else {
             // Fallback: Open in new tab for complex archive.org pages
             toast("Opening external player...");
             window.open(movie.url, "_blank");
             return;
         }
      } else {
          // Generic direct link
          container.innerHTML = `<video controls autoplay style="width:100%"><source src="${movie.url}" type="video/mp4"></video>`;
      }
    } else {
      toast("❌ No video source available");
      return;
    }
    
    openModal("video-modal");
  }

  async function download(id) {
    if(!token) {
      toast("🔒 Please Login to Download");
      return openModal("auth-modal");
    }
    try {
      const res = await fetch(`${API}/movies/download/${id}`, {
        method: "POST",
        headers: { "Authorization": token }
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail);
      
      window.open(data.url, "_blank");
      toast("✅ Download Started!");
    } catch(err) { toast("❌ " + err.message); }
  }

  function updateUI() {
    if(token) {
      document.getElementById("auth-btn").style.display = "none";
      document.getElementById("user-info").style.display = "block";
      fetch(`${API}/user/status`, {headers:{Authorization:token}})
        .then(r=>r.json()).then(d=>{ document.getElementById("t-count").textContent = d.tokens; });
    }
  }

  window.onload = () => {
    loadMovies();
    loadTrailers();
    if(token) updateUI();
  };
</script>
</body>
</html>
