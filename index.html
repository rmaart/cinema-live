<!DOCTYPE html>
<html lang="en">
<head>

  <title>Cinema-Live</title>

  <style>
    :root { --cyan: #00f3ff; --purple: #7b2cbf; --dark: #0a0e17; --glass: rgba(255,255,255,0.05); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Exo 2',sans-serif; background:var(--dark); color:#fff; overflow-x:hidden; }
    
    /* Header */
    header { padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; background:#111; position:sticky; top:0; z-index:50; }
    .logo { font-family:'Orbitron'; font-size:1.5rem; color:var(--cyan); font-weight:bold; cursor:pointer; text-transform:uppercase; letter-spacing:2px; }
    
    /* Layout */
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; padding:20px; max-width:1200px; margin:0 auto; }
    @media(max-width:768px) { .grid { grid-template-columns:1fr; } }
    
    /* Panels & Cards */
    .panel { background:#111; padding:15px; border-radius:10px; border:1px solid #333; min-height:300px; }
    .panel h2 { margin-bottom:15px; font-size:1.2rem; display:flex; align-items:center; gap:10px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:15px; }
    .card { background:#1a1a1a; border-radius:8px; overflow:hidden; border:1px solid #333; transition:transform 0.2s; }
    .card:hover { transform:translateY(-5px); border-color:var(--cyan); }
    .card img { width:100%; height:90px; object-fit:cover; background:#000; }
    .card-body { padding:10px; }
    .card-title { font-size:0.85rem; font-weight:600; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    
    /* Buttons */
    .btn { width:100%; padding:6px; margin-top:5px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:0.8rem; transition:0.2s; }
    .btn-watch { background:var(--cyan); color:#000; }
    .btn-dl { background:var(--purple); color:#fff; }
    .btn-del { background:#ef4444; color:#fff; width:auto; padding:2px 8px; font-size:0.7rem; }
    .btn:hover { opacity:0.9; }
